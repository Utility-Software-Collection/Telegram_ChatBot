<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Bot Assistant</title>
    <!-- Telegram WebApp SDK：同步加载，确保 Vue 挂载前 window.Telegram.WebApp 可用 -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // 尽早设定标题与语言，避免闪烁
      (function () {
        var code = ''
        try { code = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe || {}).user || {} } catch (e) {}
        var lc = String(code.language_code || '').toLowerCase()
        var locale = (lc === 'zh' || lc === 'zh-cn' || lc === 'zh_hans') ? 'zh-hans'
          : (lc === 'zh-tw' || lc === 'zh-hk' || lc === 'zh_hant') ? 'zh-hant'
          : (lc === 'en') ? 'en' : 'zh-hans'
        var titles = { 'zh-hans': 'Bot 助手', 'zh-hant': 'Bot 助手', 'en': 'Bot Assistant' }
        var langs = { 'zh-hans': 'zh-CN', 'zh-hant': 'zh-TW', 'en': 'en' }
        document.title = titles[locale] || titles['zh-hans']
        document.documentElement.lang = langs[locale] || langs['zh-hans']
        // 背景色立即跟随 Telegram 主题，避免白屏闪烁
        try {
          var bg = (window.Telegram.WebApp.themeParams || {}).bg_color
          if (bg) document.documentElement.style.background = bg
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
